name: NutriAI Test & Security Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify:
    name: Verify Test Reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Publish Test Results to Job Summary
        run: |
          python appiumtest/publish_results.py

      - name: Upload Selenium E2E Test Report
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-E2E-Test-Report
          path: Selenium_E2E_Test_Report.xlsx

      - name: Upload Security Vulnerabilities Report
        uses: actions/upload-artifact@v4
        with:
          name: Security-Vulnerabilities-Report
          path: Vulnerability_Security_Report.xlsx
