name: NutriAI CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  web-tests:
    name: Web App Selenium E2E Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
       cache-dependency-path: frontend/selenium-tests/package.json

    - name: Install Selenium & Test Dependencies
      run: |
        cd frontend/selenium-tests
        npm install

    - name: Run Web Selenium E2E Tests
      run: |
        cd frontend/selenium-tests
        npm test

  mobile-tests:
    name: Mobile App Flutter Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Install Flutter Dependencies
      run: |
        cd mobile
        flutter pub get

    - name: Run Mobile Unit & Widget Tests
      run: |
        cd mobile
        flutter test
